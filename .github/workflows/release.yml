name: release

# Cut a release = push a tag. Builds the single-file binary natively on each
# arch (PyInstaller can't cross-compile) and attaches both to the GitHub Release.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04        # x86_64
          - runner: ubuntu-24.04-arm    # aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install host build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y portaudio19-dev libportaudio2 libsndfile1 espeak-ng

      - name: Build binary
        run: bash packaging/build.sh

      - name: Smoke test (frozen import + version)
        run: |
          BIN="dist/hearth-$(uname -m)"
          "$BIN" --version
          # Imports all native libs, then exits on missing audio/Ollama — proves the freeze is complete.
          HEARTH_LOGGING__LEVEL=DEBUG "$BIN" 2>&1 | head -40 || true

      - uses: actions/upload-artifact@v4
        with:
          name: hearth-${{ matrix.runner }}
          path: dist/hearth-*

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/hearth-*
