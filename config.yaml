llm:
  backends:
    local:
      base_url: http://localhost:11434/v1
      model: qwen3:14b
      api_key_env: null
      supports_tools: true
      supports_streaming: true
      context_window: 8192
      cost_tier: free
      enabled: true
    remote:
      base_url: https://openrouter.ai/api/v1
      model: tencent/hy3:free # nvidia/nemotron-3-super-120b-a12b:free
      api_key_env: HEARTH_LLM__OPENROUTER_API_KEY
      supports_tools: true
      supports_streaming: true
      context_window: 8192
      cost_tier: free
      enabled: true
  tiers:
    default: local
    tool: remote
  timeout: 60.0
  max_retries: 2
veneer:
  host: 127.0.0.1
  port: 8765
tool:
  wikipedia_enabled: true
  wikipedia_language: en
  wikipedia_endpoint: /w/rest.php/v1/search/page
  wikipedia_result_count: 3
  wikipedia_max_chars: 1000
  wikipedia_timeout: 10.0
agent:
  max_tool_rounds: 3
  turn_timeout_s: 45
  tool_mode: auto
persona:
  enabled: true
conversation:
  max_history_turns: 12
storage:
  db_path: hearth.db
logging:
  level: INFO
  dir: logs
