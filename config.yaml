audio:
  input: null
  output: null
  sample_rate: 16000
  channels: 1
  block_size: 1280
  output_volume: 0.5
  normalize: true
  normalize_target_peak: 0.97
  normalize_rms_floor: 200.0
  min_transcribe_rms: 0.0
recorder:
  aggressiveness: 2
  silence_ms: 1500
  max_ms: 30000
  start_timeout_ms: 5000
  min_speech_ms: 150
  preroll_frames: 6
wake:
  model_paths:
  - models/wake/calcifer.onnx
  threshold: 0.66
  score_interval: 1
  trigger_frames: 1
  confident_threshold: 0.85
stt:
  model: medium
  device: cpu
  compute_type: int8
  cpu_threads: 4
  language: en
  beam_size: 5
  vad_filter: false
  condition_on_previous_text: false
  initial_prompt: ''
  no_speech_threshold: 0.6
  log_prob_threshold: -1.0
  hallucination_max_rms: 300.0
llm:
  provider: opencode-zen
  model: gemma4:12b
  host: http://localhost:11434
  timeout: 60.0
  health_timeout: 5.0
  num_ctx: 8192
  think: false
  serve_cmd:
  - ollama
  - serve
  api_key: ''
  base_url: https://opencode.ai/zen/v1
  fallback: ollama
  fallback_model: qwen3:14b
  max_retries: 2
  # OpenRouter's free router (provider: "openrouter", model: "openrouter/free")
  # filters to a capable model at $0 cost among currently-free models. Caveats: an
  # API key is still required (OpenRouter has no anonymous tier); free models are
  # rate-limited and rotate over time, so availability isn't guaranteed.
  # llm:
  #   provider: "openrouter"
  #   model: "openrouter/free"
  #   api_key: ""           # set via ASSISTANT_LLM__API_KEY, not here
  #   fallback: "ollama"
persona:
  enabled: true
  strength: terse
  revoice_enabled: true
  revoice_timeout_s: 5.0
agent:
  tool_mode: auto
  max_tool_rounds: 3
  turn_timeout_s: 45
verify:
  enabled: true
  pre: true
  post: true
  max_verify_rounds: 2
  spoken_feedback: true
tts:
  voice: en_US-lessac-medium
  model_path: models/piper/en_US-lessac-medium.onnx
  length_scale: 1
  ack_phrases: []
  unsure_ack_phrases:
  - Did you say something?
  - What was that?
  ack_delay_s: 0.66
storage:
  db_path: assistant.db
scheduling:
  poll_seconds: 1.0
web_search:
  providers:
  - ddgs
  - wikipedia
  language: en
  region: us-en
  result_count: 3
  max_results: 5
  timeout: 10.0
  max_snippet_chars: 500
  max_rounds: 2
  progress_updates: true
  tavily_api_key: ''
  tavily_endpoint: https://api.tavily.com/search
  exa_api_key: ''
weather:
  latitude: 33.749
  longitude: -84.38798
  location_name: Atlanta
  timezone: auto
  temperature_unit: fahrenheit
  wind_speed_unit: mph
  precipitation_unit: inch
  forecast_days: 16
  timeout: 10.0
  forecast_endpoint: https://api.open-meteo.com/v1/forecast
  geocoding_endpoint: https://geocoding-api.open-meteo.com/v1/search
calendar:
  enabled: true
  credentials_path: ~/.config/calcifer/google-service-account.json
  personal_calendar_id: harrison.blair.dev@gmail.com
  calcifer_calendar_id: d794f2b78a276a5defae2195ed50c97b47b425d05eb0cd85326e5a4b5c499294@group.calendar.google.com
  timeout: 10.0
  watcher_enabled: true
  watcher_poll_seconds: 300.0
  watcher_lead_minutes: 15
  blocked_titles:
  - get out of bed
  - go to bed
  - review i.m.t.
  hidden_tag: '[hidden]'
conversation:
  enabled: true
  followup_window_ms: 6000
  max_history_turns: 12
  decision_enabled: true
  decision_timeout_s: 4.0
  end_phrases:
  - goodbye
  - bye
  - that's all
  - that is all
  - i'm done
  - i am done
  - we're done
  - we are done
  - nevermind
  - never mind
aec:
  enabled: false
  frame_ms: 20
  filter_length_ms: 200
  extra_delay_ms: 0
barge_in:
  enabled: false
  threshold: 0.8
  trigger_frames: 3
  announcements: false
logging:
  level: INFO
  dir: logs
  file_enabled: true
  file_level: INFO
  rotate_max_bytes: 10485760
  rotate_backups: 3
  runs_to_keep: 20
