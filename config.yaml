audio:
  input: null
  output: null
  sample_rate: 16000
  channels: 1
  block_size: 1280
  output_volume: 0.5
  normalize: true
  normalize_target_peak: 0.97
  normalize_rms_floor: 200.0
recorder:
  aggressiveness: 2
  silence_ms: 800
  max_ms: 10000
  start_timeout_ms: 5000
  preroll_frames: 6
wake:
  model_path: models/wake/hey_assistant.onnx
  threshold: 0.5
  model_paths:
  - models/wake/hello_penguin.onnx
  - models/wake/hey_penguin.onnx
  - models/wake/yo_penguin.onnx
stt:
  model: distil-small.en
  device: cpu
  compute_type: int8
  cpu_threads: 4
  language: en
  beam_size: 5
  vad_filter: true
  condition_on_previous_text: false
  initial_prompt: "Penguin. Set a reminder, what time is it, search the web."
llm:
  provider: ollama
  model: qwen2.5:3b-instruct
  host: http://localhost:11434
  timeout: 60.0
  health_timeout: 5.0
  serve_cmd:
  - ollama
  - serve
tts:
  voice: en_US-lessac-medium
  model_path: models/piper/en_US-lessac-medium.onnx
storage:
  db_path: assistant.db
scheduling:
  poll_seconds: 1.0
web_search:
  provider: ddgs
  result_count: 3
  timeout: 10.0
  region: wt-wt
  timelimit: d
  max_snippet_chars: 500
  api_key: ''
  tavily_endpoint: https://api.tavily.com/search
logging:
  level: INFO
