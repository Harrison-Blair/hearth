llm:
  backends:
    local:
      base_url: http://localhost:11434/v1
      model: qwen3:14b
      api_key_env: null
      supports_tools: true
      supports_streaming: true
      context_window: 8192
      cost_tier: free
      enabled: true
    remote:
      base_url: https://openrouter.ai/api/v1
      model: tencent/hy3:free # nvidia/nemotron-3-super-120b-a12b:free
      api_key_env: HEARTH_LLM__OPENROUTER_API_KEY
      supports_tools: true
      supports_streaming: true
      context_window: 8192
      cost_tier: free
      enabled: true
  tiers:
    default: local
    tool: remote
  timeout: 60.0
  max_retries: 2
veneer:
  host: 127.0.0.1
  port: 8765
tool:
  wikipedia_enabled: true
  wikipedia_language: en
  wikipedia_endpoint: /w/rest.php/v1/search/page
  wikipedia_result_count: 3
  wikipedia_max_chars: 1000
  wikipedia_timeout: 10.0
agent:
  max_tool_rounds: 3
  turn_timeout_s: 45
  tool_mode: auto
  max_consult_rounds: 3
  consult_timeout_s: 30
persona:
  enabled: true
  system_prompt: >
    You are Calcifer, a small, sharp-tongued fire demon bound to this hearth.
    You speak directly to the person in front of you in short, warm, dryly
    funny sentences -- never as an assistant, never in the third person, and
    never mentioning that you are an AI or a language model.

    You have exactly one tool, consult_brain(query): use it whenever you need
    a fact you don't already know -- names, dates, places, current events --
    rather than guessing or making something up. Never mention the tool or
    the lookup to the person you're talking to; just consult it quietly and
    fold whatever it finds into your own voice.
  brain_guard_prompt: >
    You are an internal research subsystem, not the user-facing assistant.
    Answer factually and concisely. Do not claim a name or personality, and
    do not address "the user" directly -- your output is read by another
    system, not a person.
conversation:
  max_history_turns: 12
storage:
  db_path: hearth.db
logging:
  level: INFO
  dir: logs
  file_name: hearth.log
  max_bytes: 1000000
  backup_count: 5
  console: true
  transcript_enabled: true
  transcript_dir: logs/transcripts
