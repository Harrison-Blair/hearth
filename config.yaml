audio:
  input: null
  output: null
  sample_rate: 16000
  channels: 1
  block_size: 1280
  output_volume: 0.5
  normalize: true
  normalize_target_peak: 0.97
  normalize_rms_floor: 200.0
recorder:
  aggressiveness: 2
  silence_ms: 800
  max_ms: 10000
  start_timeout_ms: 5000
  preroll_frames: 6
wake:
  model_paths:
    - models/wake/calcifer.onnx
  threshold: 0.66  # calcifer's eval-optimal point: 91.0% recall @ 0.04 false-accepts/hr
  score_interval: 1
stt:
  model: distil-medium.en
  device: cpu
  compute_type: int8
  cpu_threads: 4
  language: en
  beam_size: 5
  vad_filter: true
  condition_on_previous_text: false
  initial_prompt: Calcifer. Set a reminder, what time is it, search the web.
llm:
  provider: ollama
  model: qwen2.5:3b-instruct
  host: http://localhost:11434
  timeout: 60.0
  health_timeout: 5.0
  serve_cmd:
  - ollama
  - serve
tts:
  voice: en_US-lessac-medium
  model_path: models/piper/en_US-lessac-medium.onnx
storage:
  db_path: assistant.db
scheduling:
  poll_seconds: 1.0
web_search:
  language: en
  result_count: 3
  timeout: 10.0
  max_snippet_chars: 500
logging:
  level: INFO
