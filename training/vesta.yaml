# Production wake-word config for "Vesta" (livekit-wakeword).
# Modeled on livekit's configs/prod.yaml. Trained via `python training/train.py`
# in .venv-train (see bootstrap.sh); the runtime consumes the exported .onnx only.
model_name: vesta
target_phrases: ["vesta"]

# ---------------------------------------------------------------------------
# Data generation
# ---------------------------------------------------------------------------
n_samples: 25000
n_samples_val: 5000
n_background_samples: 2000
n_background_samples_val: 500
tts_batch_size: 25           # 50 still OOMs sporadically on the 16 GB RX 9070 XT — VITS's
                             # stochastic duration predictor occasionally blows up the
                             # decoder's [B, 1, T] burst (~9 GiB at B=50); halving to 25
                             # halves the burst and halves the per-failure clip loss.
                             # train.py sets the ROCm PYTORCH_CUDA_ALLOC_CONF (note:
                             # expandable_segments is unsupported on ROCm builds).

# Adversarial hard negatives — 1-2 phoneme edits from "vesta", not near-identical.
custom_negative_phrases:
  - "vespa"
  - "fiesta"
  - "gesture"
  - "esther"
  - "best a"
  - "vests"
  - "vesta's"
  - "testa"
  - "vestal"
  - "vester"
  - "guess ta"
  - "west a"
  - "yes ta"
  - "besta"
  - "vasta"

# ---------------------------------------------------------------------------
# TTS parameters (Piper VITS + SLERP speaker blending)
# ---------------------------------------------------------------------------
noise_scales: [0.98]
noise_scale_ws: [0.98]
length_scales: [0.75, 1.0, 1.25]
slerp_weights: [0.2, 0.35, 0.5, 0.65, 0.8]

# ---------------------------------------------------------------------------
# Paths (under the repo's training/ dir; setup downloads into data_dir)
# ---------------------------------------------------------------------------
data_dir: training/data
output_dir: training/output

# ---------------------------------------------------------------------------
# Augmentation
# ---------------------------------------------------------------------------
augmentation:
  clip_duration: 2.0
  batch_size: 16
  rounds: 3
  background_paths: [training/data/backgrounds]
  rir_paths: [training/data/rirs]

# ---------------------------------------------------------------------------
# Model architecture — conv_attention is the accuracy win over oww's DNN head.
# ---------------------------------------------------------------------------
model:
  model_type: conv_attention
  model_size: medium

# ---------------------------------------------------------------------------
# Training
# ---------------------------------------------------------------------------
steps: 100000
learning_rate: 0.0001
weight_decay: 0.01
label_smoothing: 0.05
max_negative_weight: 3000
target_fp_per_hour: 0.1
batch_n_per_class:
  positive: 50
  adversarial_negative: 50
  ACAV100M_sample: 1024
  background_noise: 50
