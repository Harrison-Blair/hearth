# Active config for the audio surface (hearth-audio). See
# config/defaults/audio.yaml for the annotated reference.
engine:
  host: 127.0.0.1
  port: 8765

input_device: null

wake_models:
  - path: models/wake/vesta.onnx
    threshold: 0.5

endpoint:
  silence_ms: 800
  max_utterance_ms: 12000

stt:
  model: base
  language: en

# --- speaking (FTHR-035) ---
# TTS voice. NO shipped default: unset (null) = missing, which FTHR-037 turns
# into the first-run acquisition error. Real speech is FTHR-036.
voice: null

# Output playback device (PortAudio name or index); null = system default.
output_device: null

# [heard]/[spoken] presentation colours (ANSI codes); distinct so the two read
# apart at a glance.
presentation:
  heard_color: "36"   # cyan
  spoken_color: "35"  # magenta

retry:
  max_attempts: 30
  base_delay_s: 1.0
