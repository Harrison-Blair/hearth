# Audio surface (hearth-audio) reference config. Copy to config/audio.yaml and
# edit. Loaded via the shared config facility with component `audio`; holds only
# this surface's settings and never the engine's. No secrets here (FTHR-015).

# Which engine to reach (the hearth run daemon's gateway).
engine:
  host: 127.0.0.1
  port: 8765

# Input capture device (PortAudio name or index); null = system default.
input_device: null

# Ordered wake-model list. Per-model threshold, NO global threshold (FC-3).
# Shared surface: read by FTHR-029 (loads/scores models), written by FTHR-032
# (from the training registry). Defined only in hearth/audio/config.py.
wake_models:
  - path: models/wake/vesta.onnx
    threshold: 0.5

# Endpointing / VAD knobs (consumed by FTHR-030).
endpoint:
  silence_ms: 800        # trailing silence that ends an utterance
  max_utterance_ms: 12000  # hard cap on a single utterance

# Transcription model + params (consumed by FTHR-031). Defaults are the
# stenographer-proven config (FC-6); the Pi may tune to a lighter model.
stt:
  model: Systran/faster-distil-whisper-medium.en  # ~800MB, downloaded on first use
  compute_type: int8       # faster-whisper compute type
  beam_size: 5             # decoding beam width
  language: en

# --- speaking (FTHR-035) ---
# TTS voice for the spoken answer. NO shipped default (FC-2): an unset (null)
# voice is representable as *missing*, which FTHR-037 turns into the first-run
# acquisition error -- it never silently falls back to some voice. Real speech
# synthesis is FTHR-036. Set this to a piper voice name once acquired.
voice: null

# Output playback device (PortAudio name or index); null = system default
# (FC-5), mirroring input_device. Real device selection is FTHR-038.
output_device: null

# [heard]/[spoken] tagged presentation (FC-9): what was *heard* (the transcript)
# vs what was *spoken* (the answer) are tagged and coloured differently so a
# spoken conversation can be followed/debugged. ANSI colour codes; distinct.
presentation:
  heard_color: "36"   # cyan
  spoken_color: "35"  # magenta

# Connection retry/backoff for this unattended surface (FC-10): unlike chat's
# fail-fast, the audio surface waits for the engine to come up.
retry:
  max_attempts: 30
  base_delay_s: 1.0
