# hearth configuration reference. Every field here has a comment explaining
# the knob. Values may also be overridden by HEARTH_* env vars (nested with a
# double underscore, e.g. HEARTH_STORAGE__DB_PATH) or, for secrets only, a
# .env file (see .env.example). Exported env vars beat .env values.
#
# The daemon looks for its active config/engine.yaml at: $HEARTH_CONFIG (if
# set), then next to the package (a source checkout / the frozen bundle), then
# ./config/engine.yaml in the working directory -- and refuses to start without
# one. Copy this file to config/engine.yaml to create the active config.

llm:
  # backends: named LLM endpoints. "local" and "remote" are the Phase 0 pair;
  # tiers.default/tiers.tool pick which backend serves which role. Field
  # names here are a boundary contract other feathers (the router) consume —
  # keep them stable.
  backends:
    local:
      base_url: "http://localhost:11434/v1"   # Ollama's OpenAI-compatible endpoint
      model: "qwen3:14b"
      api_key_env: null            # local backend needs no key
      supports_tools: true
      supports_streaming: true     # present but unused in Phase 0
      context_window: 8192
      cost_tier: "free"
      enabled: true
    remote:
      base_url: "https://openrouter.ai/api/v1"
      model: "openrouter/free"
      api_key_env: "HEARTH_LLM__OPENROUTER_API_KEY"  # name of the env var holding the secret
      supports_tools: true
      supports_streaming: true
      context_window: 8192
      cost_tier: "free"
      enabled: true
  tiers:
    default: local    # backend used for ordinary turns
    tool: remote       # backend used for tool-calling rounds
  timeout: 60.0         # per-request timeout, seconds
  max_retries: 2        # retries on transient (429/5xx/transport) failures

gateway:
  host: "127.0.0.1"    # bind address for the engine's WebSocket control surface
  port: 8765           # veneers (e.g. hearth-chat) name this engine in their own config/chat.yaml

tool:
  wikipedia_enabled: true    # register the Wikipedia lookup tool
  wikipedia_language: "en"
  wikipedia_endpoint: "/w/rest.php/v1/search/page"    # Wikipedia REST search path
  wikipedia_result_count: 3     # top-N results included in the summary
  wikipedia_max_chars: 1000     # truncate the combined summary to this length
  wikipedia_timeout: 10.0       # request timeout, seconds

agent:
  max_tool_rounds: 3     # cap on tool-call rounds within a single nested brain consult
  turn_timeout_s: 45.0    # whole-turn budget for the local orchestrator (wraps consult_brain rounds too)
  tool_mode: "auto"      # native | json | auto: native tool-calling, JSON fallback
  max_consult_rounds: 3   # cap on consult_brain rounds the local orchestrator may run per turn
  consult_timeout_s: 30.0 # budget for a single consult_brain call into the remote brain

persona:
  enabled: true    # on = Vesta character on final spoken replies only
  # system_prompt: Vesta's identity/tone, prepended as messages[0] of every
  # turn; also tells the orchestrator when to reach for consult_brain.
  system_prompt: >
    You are Vesta. You speak directly to the person in front of you --
    never as an assistant, never in the third person, and never mentioning
    that you are an AI or a language model. Your voice is warm but measured:
    few words, steady reassurance, protective and nurturing without being
    saccharine, an unshakeable calm, and the occasional flash of dry warmth
    -- never comedy.

    You do not argue, take sides in disputes, or get drawn into hostility.
    If a conversation turns heated, you de-escalate: stay steady, don't
    match the tone, and gently redirect toward calm.

    You have exactly one tool, consult_brain(query): use it whenever you need
    a fact you don't already know -- names, dates, places, current events --
    rather than guessing or making something up. Never mention the tool or
    the lookup to the person you're talking to; just consult it quietly and
    fold whatever it finds into your own voice.
  # brain_guard_prompt: prepended as messages[0] of every nested consult_brain
  # request (FTHR-010) -- tells the remote brain it's an internal research
  # subsystem, not the user-facing assistant. Overridable via
  # HEARTH_PERSONA__BRAIN_GUARD_PROMPT.
  brain_guard_prompt: >
    You are an internal research subsystem, not the user-facing assistant.
    Answer factually and concisely. Do not claim a name or personality, and
    do not address "the user" directly -- your output is read by another
    system, not a person.

conversation:
  max_history_turns: 12    # messages kept in-session (user + assistant each 1)

storage:
  db_path: "hearth.db"    # sqlite database path

logging:
  level: "INFO"    # rotating file handler level (root logger + "websockets")
  dir: "logs"      # rotating log file lands here (gitignored)
  file_name: "hearth.log"           # rotating log file name, under `dir`
  max_bytes: 1000000                # rotate after the file reaches this size
  backup_count: 5                   # rotated files kept alongside the active one
  console: true                     # also stream logs live to stdout (`hearth run`); file logging is unaffected
  transcript_enabled: true          # write a per-session human-readable transcript
  transcript_dir: "logs/transcripts"    # transcript files land here, one per session_id
